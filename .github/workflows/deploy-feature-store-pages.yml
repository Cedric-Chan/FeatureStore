# 推送至默认分支后自动构建 React 原型并发布到 GitHub Pages（公开链接，类似 Figma Published）。
# 首次使用：仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」。
name: Deploy Feature Store (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "docs/references/feature-widetable-figma-export/**"
      - ".github/workflows/deploy-feature-store-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-feature-store
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/references/feature-widetable-figma-export/package-lock.json

      - name: Install and build
        working-directory: docs/references/feature-widetable-figma-export
        env:
          # 与 GitHub Pages 项目站路径一致：https://<owner>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/references/feature-widetable-figma-export/dist

      - id: deployment
        uses: actions/deploy-pages@v4
