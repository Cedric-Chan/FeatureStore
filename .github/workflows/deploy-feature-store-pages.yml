# 推送至默认分支后自动构建 React 原型并发布到 GitHub Pages（公开链接，类似 Figma Published）。
# 首次使用：仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」。
name: Deploy Feature Store (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "docs/references/feature-widetable-figma-export/**"
      - ".github/workflows/deploy-feature-store-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-feature-store
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # GitHub 逐步弃用 Action 内置的 Node 20；与 Node 24 对齐，见官方 changelog
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs/references/feature-widetable-figma-export/package-lock.json

      # 部分 CI 环境 NODE_ENV=production 时 npm ci 会跳过 devDependencies（vite 在 devDependencies 中）
      - name: Install dependencies
        working-directory: docs/references/feature-widetable-figma-export
        env:
          NODE_ENV: development
        run: npm ci

      - name: Build
        working-directory: docs/references/feature-widetable-figma-export
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/references/feature-widetable-figma-export/dist

      - id: deployment
        uses: actions/deploy-pages@v4
