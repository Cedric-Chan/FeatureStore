# 推送至默认分支后自动构建 React 原型并发布到 GitHub Pages（公开链接，类似 Figma Published）。
# 首次使用：仓库 Settings → Pages → Build and deployment → Source 选「GitHub Actions」。
name: Deploy Feature Store (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "docs/references/feature-widetable-figma-export/**"
      - ".github/workflows/deploy-feature-store-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-feature-store
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # 官方 Actions 运行时迁到 Node 24；此处用 FORCE_* 满足要求。
    # 项目构建使用 Node 22 LTS：Node 24 下 npm ci 曾出现 “Exit handler never called” 无输出失败。
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      # setup-node 的 pnpm cache 需先提供 pnpm 可执行文件
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: docs/references/feature-widetable-figma-export/pnpm-lock.yaml

      # 使用 pnpm 避免 GitHub Actions 上 npm 偶发 “Exit handler never called” 崩溃
      - name: Install dependencies
        working-directory: docs/references/feature-widetable-figma-export
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: docs/references/feature-widetable-figma-export
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/references/feature-widetable-figma-export/dist

      - id: deployment
        uses: actions/deploy-pages@v4
